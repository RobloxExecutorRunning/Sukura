<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layer Central | Roblox Free Layers</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <div class="container" id="auth-card">
        <h1 id="form-title">Login for Free Layers</h1>
        
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        
        <button id="main-btn" class="btn-primary">Login</button>
        <button id="switch-btn" class="btn-secondary">Create Account</button>
        
        <p class="toggle-link" id="owner-toggle">Owner Access</p>
    </div>

    <div id="admin-panel" style="display: none;">
        <h1>Owner Database View</h1>
        <p style="color: #bbb;">Logged in as: <span id="current-admin" style="color: #00a2ff; font-weight: bold;"></span></p>
        
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Layers Unlocked</th>
                </tr>
            </thead>
            <tbody id="user-table-body">
                </tbody>
        </table>
        
        <button onclick="location.reload()" class="btn-secondary" style="width: auto; padding: 10px 20px;">Exit Admin Panel</button>
    </div>

    <script src="js/auth.js"></script>

</body>
</html>
