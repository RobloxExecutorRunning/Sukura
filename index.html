<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Grant Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #080808;
            --card-bg: #111111;
            --accent: #00ff41; /* Terminal Green */
            --accent-dim: #003b11;
            --text: #d1d1d1;
            --border: #222222;
            --error: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { 
            font-size: 14px; 
            color: var(--accent); 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-dim);
            padding-bottom: 8px;
        }

        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 10px; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        
        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 10px;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-dim); }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        #status {
            margin-top: 15px;
            font-size: 11px;
            padding: 10px;
            border-radius: 2px;
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status-ok { background: #001a04; color: var(--accent); border: 1px solid var(--accent-dim); }
        .status-err { background: #1a0000; color: var(--error); border: 1px solid #440000; }
    </style>
</head>
<body>

<div class="container">
    <h2>> Item Grant Protocol</h2>
    
    <div class="input-group">
        <label>Title ID</label>
        <input id="titleId" placeholder="e.g. B9850">
    </div>

    <div class="input-group">
        <label>Oculus ID</label>
        <input id="playerOculusId" placeholder="Numeric ID">
    </div>

    <div class="input-group">
        <label>Catalog Version</label>
        <input id="catalogName" value="DLC">
    </div>

    <div class="input-group">
        <label>Item SKU</label>
        <input id="itemSku" placeholder="e.g. STICK_GOLD">
    </div>

    <button class="btn" id="execBtn" onclick="initiateGrant()">Execute Grant</button>
    <div id="status"></div>
</div>

<script>
    function updateStatus(msg, isError = false) {
        const el = document.getElementById('status');
        el.style.display = 'block';
        el.className = isError ? 'status-err' : 'status-ok';
        el.textContent = `[SYSTEM]: ${msg}`;
    }

    async function initiateGrant() {
        const btn = document.getElementById('execBtn');
        const tId = document.getElementById('titleId').value.trim();
        const oId = document.getElementById('playerOculusId').value.trim();
        const cat = document.getElementById('catalogName').value.trim();
        const sku = document.getElementById('itemSku').value.trim();

        if(!tId || !oId || !sku) return updateStatus("Missing parameters.", true);

        btn.disabled = true;
        updateStatus("Establishing connection...");

        try {
            const baseUrl = `https://${tId}.playfabapi.com`;

            // 1. Auth Login
            const loginRes = await fetch(`${baseUrl}/Client/LoginWithCustomID`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ TitleId: tId, CustomId: oId, CreateAccount: true })
            });
            const loginData = await loginRes.json();
            
            if(!loginData.data) throw new Error(loginData.errorMessage || "Login Failed");

            const ticket = loginData.data.SessionTicket;
            updateStatus("Authentication successful. Injecting item...");

            // 2. Grant Item (Set Price to 0 for items with no cost)
            const purchaseRes = await fetch(`${baseUrl}/Client/PurchaseItem`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Authorization': ticket },
                body: JSON.stringify({
                    CatalogVersion: cat,
                    ItemId: sku,
                    Price: 0,
                    VirtualCurrency: "GR" // Or your specific currency code
                })
            });

            const purchaseData = await purchaseRes.json();
            if(purchaseData.code === 200) {
                updateStatus(`SUCCESS: ${sku} linked to ${oId}`);
            } else {
                throw new Error(purchaseData.errorMessage || "Grant rejected by server.");
            }

        } catch (e) {
            updateStatus(e.message, true);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
